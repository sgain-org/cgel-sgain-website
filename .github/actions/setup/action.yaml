name: Setup
description: Set up pnpm, Node.js, and install dependencies.

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v6
      with:
        run_install: false

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
