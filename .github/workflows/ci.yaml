name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm lint:ci

  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm check

  preview:
    name: Preview
    runs-on: ubuntu-latest
    needs: [lint, check]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build

      - name: Upload preview version
        id: upload
        run: |
          set -o pipefail
          pnpm exec wrangler versions upload 2>&1 | tee wrangler-output.txt
          url="$(grep -oP 'Version Preview URL:\s*\K\S+' wrangler-output.txt | head -n1 || true)"
          if [ -z "$url" ]; then
            echo "::error::Could not find a preview URL in the wrangler output"
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v9
        env:
          PREVIEW_URL: ${{ steps.upload.outputs.url }}
        with:
          script: |
            const comment = require("./.github/scripts/comment-preview-url.cjs");
            await comment({ github, context, core });

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint, check]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build

      - name: Deploy to Cloudflare
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-hostinger:
    name: Deploy (Hostinger)
    runs-on: ubuntu-latest
    needs: [lint, check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    concurrency:
      group: deploy-hostinger-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build

      - name: Install lftp for FTP deployment
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to Hostinger
        run: ./scripts/deploy.sh
        env:
          REMOTE_USERNAME: ${{ secrets.REMOTE_USERNAME }}
          REMOTE_PASSWORD: ${{ secrets.REMOTE_PASSWORD }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
